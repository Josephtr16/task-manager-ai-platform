name: taskflow_ai_mobile
description: TaskFlow AI mobile companion app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  dio: ^5.4.3
  go_router: ^13.2.0
  flutter_secure_storage: ^9.0.0
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  table_calendar: ^3.1.2
  shimmer: ^3.0.0
  intl: ^0.19.0
  lottie: ^3.1.0
