  fluttertoast: ^8.2.4
  connectivity_plus: ^6.0.3
  share_plus: ^10.0.0
  url_launcher: ^6.3.0
  percent_indicator: ^4.2.3
  flutter_slidable: ^3.1.0
  modal_bottom_sheet: ^3.0.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
